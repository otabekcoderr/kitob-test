<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
  <!-- =====================================================
       META
  ====================================================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- SEO -->
  <title>Kitobchi — O'zbek kitoblar testi platformasi</title>
  <meta name="description"
    content="O'zbek adabiyoti bo'yicha testlar yeching, bilimingizni sinang va reyting jadvali orqali raqobatlashing." />
  <meta name="keywords"
    content="kitob, test, o'zbek adabiyoti, kitobchi, bilim, reyting" />
  <meta name="author" content="Kitobchi" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Kitobchi — O'zbek kitoblar testi" />
  <meta property="og:description" content="O'zbek adabiyoti bo'yicha testlar yeching va bilimingizni sinang." />
  <meta property="og:locale"      content="uz_UZ" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <text y='.9em' font-size='90'>📚</text>
    </svg>" />

  <!-- =====================================================
       GOOGLE FONTS
  ====================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- =====================================================
       CSS
  ====================================================== -->
  <link rel="stylesheet" href="css/style.css?v=2.0.1" />

  <!-- =====================================================
       APP (ES Module)
  ====================================================== -->
  <script type="module" src="js/app.js?v=2.0.1"></script>
</head>

<body>
  <!-- Skip navigatsiya (accessibility) -->
  <a href="#app" class="skip-link">Asosiy kontentga o'tish</a>

  <!-- =====================================================
       NAVBAR (app.js tomonidan to'ldiriladi)
  ====================================================== -->
  <header id="navbar" role="banner"></header>

  <!-- =====================================================
       ASOSIY KONTENT
       app.js router har bir sahifani shu elementga render qiladi
  ====================================================== -->
  <main id="app" tabindex="-1">
    <!--
      Birinchi yuklash: JS ishga tushguncha ko'rsatiladigan
      loading ekrani. app.js render qilganida o'chadi.
    -->
    <div class="initial-loader" id="initial-loader" aria-label="Yuklanmoqda...">
      <div class="initial-loader__logo">
        <span class="initial-loader__icon" aria-hidden="true">📚</span>
        <span class="initial-loader__text">Kitobchi</span>
      </div>
      <div class="initial-loader__spinner" aria-hidden="true"></div>
    </div>
  </main>

  <!-- =====================================================
       FOOTER
  ====================================================== -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand">
        <span class="footer__icon" aria-hidden="true">📚</span>
        <span class="footer__name">Kitobchi</span>
      </div>

      <nav class="footer__nav" aria-label="Footer navigatsiya">
        <a href="#home"        class="footer__link">Bosh sahifa</a>
        <a href="#books"       class="footer__link">Kitoblar</a>
        <a href="#leaderboard" class="footer__link">Reyting</a>
      </nav>

      <p class="footer__copy">
        &copy; <span id="footer-year"></span> Kitobchi.
        Barcha huquqlar himoyalangan.
      </p>
    </div>
  </footer>

  <!-- =====================================================
       INLINE SCRIPT — faqat eng muhim boshlang'ich ishlar:
       1. Temani FOUC (Flash of Unstyled Content) dan himoya
       2. Footer yilni dinamik qo'yish
  ====================================================== -->
  <script>
    // Temani iloji boricha ertaroq qo'llash (FOUC oldini olish)
    (function () {
      try {
        var saved = localStorage.getItem('kitobchi_theme');
        var theme = (saved === 'dark' || saved === 'light')
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* ignore */ }
    })();

    // Footer yil
    var yearEl = document.getElementById('footer-year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>
</body>
</html>
